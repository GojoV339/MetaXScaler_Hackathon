name: codereview-env
version: "1.0.0"
description: >
  A reinforcement learning environment where an AI agent learns to perform
  professional code reviews. The agent detects bugs, classifies their type,
  assesses severity, and suggests specific fixes across three difficulty levels.

tags:
  - openenv
  - code-review
  - software-engineering
  - reinforcement-learning

author: "Palle Venkata Dharaneswara Reddy"

environment:
  type: text
  api_base: http://0.0.0.0:7860

tasks:
  - id: bug_detection
    level: 1
    difficulty: easy
    description: "Detect whether a code snippet contains a bug"

  - id: bug_classification
    level: 2
    difficulty: medium
    description: "Detect and classify the type of bug in a code snippet"

  - id: full_review
    level: 3
    difficulty: hard
    description: "Full code review: detect, classify, assess severity, and suggest fix"

  - id: code_smell_detection
    level: 4
    difficulty: medium
    description: "Identify code quality issues: magic numbers, dead code, god functions"

  - id: security_audit
    level: 5
    difficulty: hard
    description: "OWASP security audit: SQL injection, XSS, hardcoded secrets"

  - id: performance_optimization
    level: 6
    difficulty: hard
    description: "Identify Big-O complexity issues and suggest faster algorithms"

  - id: test_coverage_review
    level: 7
    difficulty: hard
    description: "Assess testability and identify missing unit test cases"

  - id: refactoring_detection
    level: 8
    difficulty: medium
    description: "Identify extract_method, parameter_object, and duplicate code refactoring opportunities"

  - id: solid_violations
    level: 9
    difficulty: hard
    description: "Detect SRP, OCP, LSP, ISP, DIP violations in class and module design"

  - id: error_handling_review
    level: 10
    difficulty: medium
    description: "Evaluate missing try/except, bare excepts, silent failures, and logging gaps"

  - id: documentation_review
    level: 11
    difficulty: easy
    description: "Assess missing docstrings, type hints, and parameter descriptions"

  - id: concurrency_review
    level: 12
    difficulty: hard
    description: "Detect race conditions, blocking async calls, and missing locks"

  - id: api_design_review
    level: 13
    difficulty: hard
    description: "Evaluate naming consistency, parameter count, validation, and REST design"

  - id: code_comparison
    level: 14
    difficulty: hard
    description: "Compare v1 vs v2: determine improvement, new bugs, and verdict"

  - id: dependency_review
    level: 15
    difficulty: medium
    description: "Identify unused imports, risky packages (pickle/eval), and over-importing"

observation_space:
  type: object
  fields:
    snippet_id: string
    code: string
    language: string
    task_level: integer
    step_number: integer
    context_hint: string (optional)

action_space:
  type: object
  fields:
    has_bug: boolean
    bug_type: "logic_error | security_vulnerability | performance_issue | syntax_error | no_bug"
    severity: "low | medium | high | critical | none"
    suggested_fix: string

reward:
  range: [0.0, 1.0]
  type: float
  description: "Partial credit awarded across all tasks. Task 3 uses LLM-as-judge for fix quality."

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  health: GET /health
